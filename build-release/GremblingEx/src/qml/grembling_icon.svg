<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background (Base) -->
  <rect width="100" height="100" rx="20" ry="20" fill="#1e1e2e"/>
  
  <!-- Hollow/Neon hexagon -->
  <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" 
           fill="none" stroke="#cba6f7" stroke-width="6" 
           stroke-linejoin="round" filter="url(#glow)"/>
           
  <!-- Inner joystick abstract -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="#cba6f7" stroke-width="4" filter="url(#glow)"/>
  
  <line x1="50" y1="50" x2="65" y2="35" stroke="#cba6f7" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
</svg>
